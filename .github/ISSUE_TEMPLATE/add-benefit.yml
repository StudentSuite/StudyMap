name: Add or improve a benefit guide
description: Suggest a student-benefit guide (free software, travel, paperwork, perks).
title: "[benefit] "
labels: ["benefit"]
body:
  - type: markdown
    attributes:
      value: |
        Benefit guides are long-form MDX. Suggest a new guide or a fix to an
        existing one. Keep it practical and link to official sources.
  - type: input
    id: topic
    attributes:
      label: Topic
      placeholder: Student discount on a software tool
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What should the guide cover?
      description: The steps, who qualifies, and the official links to follow.
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Official sources
      description: Links that back up the steps and eligibility.
    validations:
      required: true
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Checklist
      options:
        - label: The steps point to official sources, not resellers or referral links.
          required: true
        - label: The guide does not include personal data or anything paywalled or copyrighted.
          required: true

name: Feature request
description: Suggest a new feature or improvement.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make StudyMap better? A clear problem statement helps us understand the need.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the need or frustration this feature would address.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen? How should it work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context (optional)
      description: Mockups, examples, links, or anything else helpful.
    validations:
      required: false
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
